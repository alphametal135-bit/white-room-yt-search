<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYBER DEFENSE — منظومة الأمن السيبراني</title>
<script>
// ── Firebase Safety Shim ── يمنع خطأ firebase is not defined لو CDN تأخر أو فشل
if (typeof window.firebase === "undefined") {
  var _authStub = function() {
    return {
      setPersistence: function(){ return Promise.resolve(); },
      onAuthStateChanged: function(){},
      signInWithEmailAndPassword: function(){ return Promise.reject(new Error("firebase not loaded")); },
      createUserWithEmailAndPassword: function(){ return Promise.reject(new Error("firebase not loaded")); },
      signOut: function(){ return Promise.resolve(); }
    };
  };
  _authStub.Auth = { Persistence: { LOCAL: "local", SESSION: "session", NONE: "none" } };

  var _fsStub = function() { return null; };
  _fsStub.FieldValue = {
    increment: function(){ return 0; },
    arrayUnion: function(){ return []; },
    arrayRemove: function(){ return []; }
  };

  window.firebase = {
    initializeApp: function(){},
    auth: _authStub,
    firestore: _fsStub
  };
}
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Share+Tech+Mono&display=swap');

:root {
  /* ── ألوان الصورة: أسود + بنفسجي داكن ── */
  --bg: #0d0d14;
  --bg2: #111120;
  --bg3: #16162a;
  --surface: rgba(26, 26, 46, 0.70);
  --surface2: rgba(30, 30, 55, 0.55);
  --border: rgba(176, 110, 243, 0.18);
  --border2: rgba(176, 110, 243, 0.32);

  /* ── ألوان النص ── */
  --text: #f0eaff;
  --text1: #f0eaff;
  --text2: #b06ef3;
  --text3: #5a4a7a;

  /* ── البنفسجي الرئيسي (accent) ── */
  --green: #b06ef3;
  --green2: #8b2fc9;
  --green-dim: rgba(176, 110, 243, 0.13);

  /* ── الوردي الفوشيا (gold) ── */
  --gold: #f0249e;
  --gold-dim: rgba(240, 36, 158, 0.10);

  /* ── الأحمر ── */
  --red: #f87171;
  --red-dim: rgba(248, 113, 113, 0.12);

  /* ── Glassmorphism ── */
  --glass: rgba(22, 22, 40, 0.60);
  --glass-border: rgba(176, 110, 243, 0.20);
  --glass-shadow: 0 8px 32px rgba(100, 20, 180, 0.22), 0 2px 8px rgba(0,0,0,0.50);
  --glass-hover: rgba(35, 35, 65, 0.75);
  --blur: blur(14px);

  --mono: 'Share Tech Mono', monospace;
  --sans: 'Cairo', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

/* إخفاء كل العناصر الخلفية لما صفحة الكيمياء السيبرانية تكون مفتوحة */
body.cyber-chem-active::before,
body.cyber-chem-active::after { display: none !important; }
body.cyber-chem-active #matrix-canvas { display: none !important; }
body.cyber-chem-active .status-bar { display: none !important; }
body.cyber-chem-active { background: #060a0c !important; }
#page-cyber-chem {
  position: fixed !important;
  top: 82px !important; left: 0 !important; right: 0 !important; bottom: 0 !important;
  width: 100vw !important; max-width: 100vw !important;
  height: calc(100vh - 82px) !important;
  z-index: 500 !important; background: #060a0c !important;
  padding: 0 !important; margin: 0 !important;
}
#page-cyber-chem iframe {
  width: 100% !important; height: 100% !important; display: block !important;
}

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
}

/* ── خلفية داكنة بنفسجية ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(139, 47, 201, 0.20) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 80%, rgba(176, 110, 243, 0.10) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 50%, rgba(30, 15, 60, 0.60) 0%, transparent 80%),
    linear-gradient(135deg, #0d0d14 0%, #13132a 50%, #0d0d14 100%);
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(176, 110, 243, 0.015) 2px,
    rgba(176, 110, 243, 0.015) 3px
  );
  pointer-events: none;
  z-index: 0;
}

/* ══ POINTS TOAST (نافذة منبثقة في منتصف الشاشة، تفضل ظاهرة لحد ما المستخدم يقفلها) ══ */
.points-toast-bg {
  position: fixed; inset: 0; z-index: 6000; background: rgba(0,0,0,.75);
  display: none; align-items: center; justify-content: center; padding: 20px;
}
.points-toast-bg.show { display: flex; }
.points-toast {
  position: relative;
  background: rgba(6, 22, 60, 0.80);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(176, 110, 243, 0.22);
  border-radius: 20px;
  padding: 28px 26px 22px;
  display: flex; flex-direction: column; align-items: center; gap: 8px; text-align: center;
  width: 360px; max-width: 100%;
  box-shadow: 0 16px 48px rgba(100, 20, 180, 0.28);
  transform: scale(.92); opacity: 0; transition: transform .25s cubic-bezier(.16,1,.3,1), opacity .25s;
}
.points-toast-bg.show .points-toast { transform: scale(1); opacity: 1; }
.points-toast.gain { border-top: 3px solid var(--green); }
.points-toast.lose { border-top: 3px solid var(--red); }
.points-toast.warn { border-top: 3px solid var(--gold); }
.toast-close-btn {
  position: absolute; top: 10px; left: 10px; background: transparent; border: 1px solid var(--border);
  color: var(--text3); font-family: var(--mono); font-size: 13px; line-height: 1; cursor: pointer;
  padding: 5px 9px; transition: all .15s;
}
.toast-close-btn:hover { border-color: var(--red); color: var(--red); }
.toast-icon { font-size: 30px; }
.toast-body {}
.toast-title { font-family: var(--mono); font-size: 12px; letter-spacing: 2px; color: var(--text); margin-bottom: 4px; }
.toast-sub { font-family: var(--mono); font-size: 10px; color: var(--text3); letter-spacing: 1px; line-height: 1.7; }
.toast-pts { font-family: var(--mono); font-size: 24px; font-weight: 700; margin-top: 6px; }
.toast-pts.plus { color: var(--green); }
.toast-pts.minus { color: var(--red); }

.pts-pill { background: var(--gold-dim); border: 1px solid var(--gold); padding: 2px 10px; font-family: var(--mono); font-size: 11px; color: var(--gold); letter-spacing: 1px; font-weight: bold; }

/* ══ NAV ══ */
/* ══ NAV — متناسق على كل الشاشات ══ */
.nav {
  position: sticky; top: 0; z-index: 200;
  background: rgba(13,13,20,0.95);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(176,110,243,0.12);
  box-shadow: 0 4px 20px rgba(100,20,180,0.18);
}
.nav-top-row {
  display: flex; align-items: center;
  padding: 0 20px; height: 46px; gap: 10px;
}
.nav-tabs-row {
  display: flex; align-items: center;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none; padding: 0 10px;
  background: rgba(10,10,18,0.50);
  border-top: 1px solid rgba(176,110,243,0.07);
  gap: 1px; height: 36px;
}
.nav-tabs-row::-webkit-scrollbar { display: none; }
.nav-logo {
  font-family: var(--mono); font-size: 11px; color: #fff;
  letter-spacing: 2px; display: flex; align-items: center; gap: 7px;
  flex-shrink: 0; white-space: nowrap;
}
.wr-logo-frame {
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(64,224,208,0.22) 0%, rgba(10,12,16,0.9) 65%, rgba(10,12,16,1) 100%);
  border: 1px solid rgba(90,224,208,0.45);
  box-shadow: 0 0 10px rgba(64,224,208,0.35), inset 0 0 8px rgba(64,224,208,0.15);
  overflow: hidden;
}
.wr-logo-frame img { display: block; width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.nav-tools {
  display: flex; align-items: center; gap: 7px;
  margin-right: auto; flex-shrink: 0;
}
.nav-user-id { font-family: var(--mono); font-size: 10px; color: var(--green); white-space: nowrap; }
.nav-user-label { font-family: var(--mono); font-size: 9px; color: var(--text3); display: none; }
.music-btn {
  display: flex; align-items: center; justify-content: center;
  width: 30px; height: 30px; border-radius: 50%;
  background: rgba(176,110,243,0.10);
  border: 1px solid rgba(176,110,243,0.30);
  color: var(--green); font-size: 14px;
  cursor: pointer; transition: all .2s; flex-shrink: 0;
}
.music-btn:hover { background: rgba(176,110,243,0.22); border-color: var(--green); transform: scale(1.1); }
.music-btn.playing { border-color: var(--green); animation: music-pulse 1.4s ease-in-out infinite; }
@keyframes music-pulse {
  0%,100% { box-shadow: 0 0 5px rgba(176,110,243,0.3); }
  50% { box-shadow: 0 0 12px rgba(176,110,243,0.7); }
}
.notif-btn {
  display: flex; align-items: center; justify-content: center;
  width: 30px; height: 30px; border-radius: 50%;
  background: transparent; border: 1px solid rgba(176,110,243,0.18);
  color: var(--text); font-size: 14px; cursor: pointer;
  transition: all .2s; flex-shrink: 0; position: relative;
}
.notif-btn:hover { border-color: var(--green); background: rgba(176,110,243,0.10); }
.nav-logout {
  background: transparent; border: 1px solid rgba(248,113,113,0.25);
  border-radius: 8px; color: var(--text3); font-family: var(--sans);
  font-size: 10px; padding: 4px 10px; cursor: pointer; transition: all .15s;
  white-space: nowrap; flex-shrink: 0;
}
.nav-logout:hover { border-color: var(--red); color: var(--red); background: rgba(248,113,113,0.08); }
.nav-tabs { display: contents; }
.tab-btn {
  padding: 0 10px; height: 36px; border: none;
  background: transparent; color: rgba(144,140,180,0.65);
  font-family: var(--sans); font-size: 11px; font-weight: 600;
  cursor: pointer; transition: all .15s;
  border-bottom: 2px solid transparent;
  white-space: nowrap; flex-shrink: 0;
}
.tab-btn:hover { color: rgba(200,190,240,0.9); background: rgba(176,110,243,0.06); }
.tab-btn.active { color: #fff; border-bottom-color: var(--green); background: rgba(176,110,243,0.08); }

/* مشغّل الموسيقى المصغّر */
.music-player-mini {
  display: none; position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
  background: rgba(18,18,35,0.96); backdrop-filter: blur(20px);
  border: 1px solid rgba(176,110,243,0.30); border-radius: 40px;
  padding: 8px 16px; gap: 10px; align-items: center;
  box-shadow: 0 8px 28px rgba(100,20,180,0.35);
  z-index: 5000; min-width: 260px; max-width: 92vw;
}
.music-player-mini.show { display: flex; }
.music-track-name { font-family: var(--mono); font-size: 10px; color: var(--text2); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.music-ctrl-btn {
  background: transparent; border: none; color: var(--green);
  font-size: 17px; cursor: pointer; padding: 2px; transition: transform .15s; flex-shrink: 0;
}
.music-ctrl-btn:hover { transform: scale(1.2); }
.music-vol-slider {
  -webkit-appearance: none; appearance: none;
  width: 55px; height: 3px;
  background: rgba(176,110,243,0.3); border-radius: 2px; outline: none; flex-shrink: 0;
}
.music-vol-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 11px; height: 11px; border-radius: 50%;
  background: var(--green); cursor: pointer;
}

/* STATUS BAR */
.status-bar {
  background: rgba(13,13,20,0.80);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(176,110,243,0.08);
  padding: 5px 16px; display: flex; align-items: center; gap: 14px;
  overflow-x: auto; scrollbar-width: none; flex-wrap: nowrap;
  box-shadow: 0 2px 12px rgba(120,0,160,0.10);
}
.status-bar::-webkit-scrollbar { display: none; }

/* ══ PAGES ══ */
.status-item { font-family: var(--mono); font-size: 10px; letter-spacing: 1px; color: var(--text3); text-transform: uppercase; white-space: nowrap; flex-shrink: 0; }
.status-item span { color: var(--green); }
.status-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); animation: blink 2s infinite; }
@keyframes blink { 0%,100% { opacity: 1 } 50% { opacity: .2 } }
.page { display: none; padding: 28px; max-width: 1100px; margin: 0 auto; position: relative; z-index: 1; }
.page.active { display: block; }
.eyebrow { font-family: var(--sans); font-size: 13px; font-weight: 700; color: var(--text2); margin: 28px 0 12px; display: flex; align-items: center; gap: 10px; }
.eyebrow::before { content: ''; display: block; width: 16px; height: 2px; background: var(--green); }
.eyebrow:first-child { margin-top: 0; }

/* ══ STATS GRID ══ */
.stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 16px; }
.stat-card {
  background: var(--glass);
  backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  padding: 20px 18px;
  box-shadow: var(--glass-shadow);
  transition: transform .2s, box-shadow .2s;
}
.stat-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 40px rgba(100, 20, 180, 0.25), 0 2px 8px rgba(0,0,0,0.4);
}
.stat-num { font-family: var(--mono); font-size: 28px; line-height: 1; margin-bottom: 5px; }
.stat-num.green { color: var(--green); }
.stat-num.gold { color: var(--gold); }
.stat-label { font-family: var(--sans); font-size: 11px; color: var(--text3); }

/* ══ SUBJECTS ══ */
.list-header { display: grid; grid-template-columns: 36px 1fr 100px 100px 90px 90px 110px 110px 40px; gap: 12px; padding: 8px 16px; background: #0A0A0C; color: var(--text3); font-family: var(--sans); font-size: 11px; border: 1px solid var(--border); border-bottom: none; }
.subjects-list { display: flex; flex-direction: column; gap: 8px; }
.subject-card {
  background: var(--glass);
  backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--glass-border);
  border-radius: 14px;
  padding: 14px 16px;
  display: grid; grid-template-columns: 36px 1fr 100px 100px 90px 90px 110px 110px 40px;
  align-items: center; gap: 12px;
  transition: all .2s; position: relative;
  box-shadow: 0 4px 16px rgba(0,80,180,0.12);
}
.subject-card::before { content: ''; position: absolute; right: 0; top: 10%; width: 3px; height: 80%; background: var(--green); border-radius: 2px; opacity: 0; transition: opacity .2s; }
.subject-card:hover::before { opacity: 1; }
.subject-card:hover {
  background: var(--glass-hover);
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(0, 120, 220, 0.20);
}
.subject-name-input { background: transparent; border: none; color: var(--text); font-family: var(--sans); font-size: 14px; font-weight: 700; width: 100%; outline: none; border-bottom: 1px solid transparent; }
.subject-name-input:focus { border-bottom-color: var(--green); }
.subject-cat { font-family: var(--sans); font-size: 11px; color: var(--text3); margin-top: 2px; }
.num-col { display: flex; flex-direction: column; align-items: center; }
.num-input {
  background: rgba(5, 20, 50, 0.50);
  border: 1px solid rgba(56,189,248,0.18);
  border-radius: 8px;
  color: var(--text); font-family: var(--mono); font-size: 14px;
  width: 75px; text-align: center; padding: 5px; outline: none;
  transition: border-color .2s;
}
.num-input:focus { border-color: rgba(56,189,248,0.45); }
.pts-display { font-family: var(--mono); font-size: 15px; color: var(--green); text-align: center; }
.del-btn { background: transparent; border: 1px solid transparent; color: var(--text3); cursor: pointer; font-size: 12px; padding: 5px; }
.del-btn:hover { border-color: var(--red); color: var(--red); }
.add-btn {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 14px;
  background: rgba(56, 189, 248, 0.04);
  backdrop-filter: blur(8px);
  border: 1.5px dashed rgba(56, 189, 248, 0.22);
  border-radius: 14px;
  color: var(--text2); font-family: var(--sans); font-size: 12px; font-weight: bold;
  cursor: pointer; margin-top: 8px;
  transition: all .2s;
}
.add-btn:hover {
  border-color: var(--green); color: var(--green);
  border-style: solid;
  background: rgba(56, 189, 248, 0.08);
  box-shadow: 0 4px 16px rgba(56,189,248,0.12);
}
.study-src-btn { background: var(--green-dim); border: 1px solid var(--green); color: var(--green); font-family: var(--sans); font-size: 11px; padding: 4px 8px; cursor: pointer; font-weight: bold; width: 100%; text-align: center; }
.study-src-btn:hover { background: var(--green); color: #000; }
.ai-quiz-btn { background: var(--gold-dim); border: 1px solid var(--gold); color: var(--gold); font-family: var(--sans); font-size: 11px; padding: 4px 8px; cursor: pointer; font-weight: bold; width: 100%; text-align: center; }
.ai-quiz-btn:hover { background: var(--gold); color: #000; }
.ai-quiz-btn:disabled { opacity: 0.5; cursor: wait; }
/* ══ AI QUIZ MODAL ══ */
.ai-quiz-modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85); z-index: 3000; align-items: center; justify-content: center; padding: 20px; }
.ai-quiz-modal-bg.open { display: flex; }
.ai-quiz-modal { background: var(--surface); border: 1px solid var(--border2); border-top: 3px solid var(--gold); padding: 28px; width: 620px; max-width: 100%; max-height: 88vh; overflow-y: auto; position: relative; }
.ai-quiz-modal-title { font-size: 15px; font-weight: bold; color: var(--gold); margin-bottom: 6px; }
.ai-quiz-modal-sub { font-size: 12px; color: var(--text3); font-family: var(--mono); margin-bottom: 18px; }
.ai-quiz-loading { text-align: center; padding: 40px; }
.ai-quiz-loading-icon { font-size: 36px; animation: spin 1.2s linear infinite; display: inline-block; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.ai-quiz-close { position: absolute; top: 12px; left: 12px; background: transparent; border: 1px solid var(--border); color: var(--text3); font-family: var(--mono); font-size: 12px; padding: 5px 9px; cursor: pointer; }
.ai-quiz-close:hover { border-color: var(--red); color: var(--red); }

/* ══ STREAMING INTERFACE ══ */
.source-viewer-container { display: grid; grid-template-columns: 320px 1fr; gap: 20px; background: var(--surface); border: 1px solid var(--border); padding: 20px; margin-top: 15px; }
.source-sidebar { border-left: 1px solid var(--border); padding-left: 15px; display: flex; flex-direction: column; gap: 8px; }
.source-item-link { background: var(--bg2); border: 1px solid var(--border); padding: 10px; font-size: 12px; cursor: pointer; color: var(--text2); transition: all 0.2s; text-align: right; }
.source-item-link:hover, .source-item-link.active { border-color: var(--green); color: var(--green); background: var(--bg3); }
.video-frame-wrapper { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; border: 1px solid var(--border2); }
.video-frame-wrapper iframe { position: absolute; inset:0; width:100%; height:100%; border:none; }
.live-reward-ticker { background: #0A0A0C; padding: 10px; border: 1px solid var(--gold); display: flex; justify-content: space-between; align-items: center; font-family: var(--mono); font-size: 12px; margin-bottom: 10px; }

/* ══ TIME BREAKDOWN ══ */
.time-breakdown { background: var(--surface); border: 1px solid var(--border); padding: 20px 22px; margin-top: 2px; }
.time-rows { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1px; background: var(--border); }
.time-row-item { background: var(--bg2); padding: 14px 12px; text-align: center; }
.time-row-val { font-family: var(--mono); font-size: 22px; color: var(--green); margin-bottom: 4px; }
.time-row-unit { font-family: var(--mono); font-size: 9px; color: var(--text3); letter-spacing: 1px; }

/* ══ TRACKER ══ */
.week-nav { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
.week-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: var(--sans); font-size: 11px; padding: 6px 12px; cursor: pointer; }
.log-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; background: var(--border); border: 1px solid var(--border); }
.day-cell { background: var(--surface); aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; }
.day-cell.today { outline: 2px solid var(--green); outline-offset: -2px; }
.day-cell.done { background: rgba(78, 168, 138, 0.1); border: 1px solid rgba(78, 168, 138, 0.25); }
.day-cell.future { cursor: not-allowed; opacity: .35; }

/* ══ RANKINGS & PROFILES ══ */
.profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.profile-card {
  background: var(--glass);
  backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--glass-border);
  border-radius: 18px;
  padding: 20px;
  box-shadow: var(--glass-shadow);

.auth-info-panel-title {
  display:flex; align-items:center; gap:10px;
  font-size:13px; font-weight:bold; color:var(--gold);
  margin-bottom:16px; padding-bottom:10px;
  border-bottom:1px solid var(--border);
}
.auth-info-panel-title::before { content:''; display:block; width:14px; height:2px; background:var(--gold); flex-shrink:0; }
.auth-info-section { margin-bottom:14px; }
.auth-info-section-title {
  font-size:11px; font-weight:bold; color:var(--text2);
  margin-bottom:8px; text-transform:uppercase; letter-spacing:1px;
  display:flex; align-items:center; gap:6px;
}
.auth-info-row {
  display:flex; align-items:flex-start; gap:8px;
  padding:6px 0; border-bottom:1px solid var(--border);
  font-size:12px; color:var(--text3); line-height:1.6;
}
.auth-info-row:last-child { border-bottom:none; }
.auth-info-dot { flex-shrink:0; margin-top:3px; font-size:10px; color:var(--gold); }
.auth-info-row strong { color:var(--text2); }
.auth-info-gain { color:var(--green) !important; font-weight:bold; }
.auth-info-lose { color:var(--red) !important; font-weight:bold; }
.auth-info-warn { color:var(--gold) !important; font-weight:bold; }
.auth-info-new-year {
  margin-top:14px; padding:12px 14px;
  background:rgba(200,168,74,.08);
  border:1px solid rgba(200,168,74,.3);
  border-right:3px solid var(--gold);
  border-radius:2px;
  font-size:11.5px; color:var(--text2); line-height:1.8;
}
.auth-info-new-year-title { font-weight:bold; color:var(--gold); margin-bottom:4px; font-size:12px; }

/* ══ AUTH BUTTON LOADING STATE ══ */
.auth-btn.loading {
  opacity: 0.75; cursor: not-allowed; pointer-events: none;
  background: var(--bg3); color: var(--text3); border: 1px solid var(--border2);
}
.auth-btn-loader {
  display: inline-block; width: 12px; height: 12px;
  border: 2px solid var(--text3); border-top-color: var(--green);
  border-radius: 50%; animation: spin 0.7s linear infinite;
  vertical-align: middle; margin-left: 8px;
}

/* ══ توهج أحمر لاسم قائد العمليات ومعرفه (System ID) في أي مكان بالنظام ══ */
.founder-glow {
  color: #FF2222 !important;
  font-weight: 900 !important;
  animation: founder-glow-pulse 1.4s ease-in-out infinite;
  display: inline-block;
}
@keyframes founder-glow-pulse {
  0%, 100% {
    text-shadow: 0 0 4px rgba(255,30,30,.9), 0 0 10px rgba(255,30,30,.6), 0 0 20px rgba(255,50,50,.3);
    filter: brightness(1);
  }
  50% {
    text-shadow: 0 0 8px rgba(255,30,30,1), 0 0 22px rgba(255,30,30,.95), 0 0 44px rgba(255,60,60,.7), 0 0 70px rgba(255,30,30,.4);
    filter: brightness(1.35);
  }
}
/* صف كامل في الجداول للمؤسس */
.founder-row td { background: rgba(255,30,30,0.06) !important; }
.founder-row { border-right: 3px solid #FF2222 !important; }

/* ══ AUTH INFO — أيقونة دائرية صغيرة بدل اللوحة الكبيرة ══ */
.auth-info-btn {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--surface); border: 1.5px solid var(--gold);
  color: var(--gold); font-size: 17px; font-weight: bold;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; margin: 20px auto 10px; flex-shrink: 0;
  align-self: center;
  animation: auth-info-pulse 1.8s ease-in-out infinite;
}
@keyframes auth-info-pulse {
  0%, 100% { box-shadow: 0 0 4px 0 rgba(200,168,74,.35); opacity: .65; }
  50% { box-shadow: 0 0 14px 4px rgba(200,168,74,.85); opacity: 1; }
}
#auth-info-modal-bg {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7);
  z-index: 6000; align-items: center; justify-content: center; padding: 20px;
  overflow-y: auto;
}
#auth-info-modal-bg.show { display: flex; }
#auth-info-modal-bg .auth-info-panel { max-height: 80vh; overflow-y: auto; position: relative; }
.auth-info-close-btn {
  position: absolute; top: 8px; left: 8px; background: none; border: none;
  color: var(--text3); font-size: 18px; cursor: pointer; padding: 4px 8px;
}

/* ══ AUTH OVERLAY ══ */
#auth-overlay {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at 30% 30%, rgba(139,47,201,0.22) 0%, transparent 60%),
              radial-gradient(ellipse at 75% 75%, rgba(176,110,243,0.10) 0%, transparent 55%),
              linear-gradient(135deg, #0d0d14 0%, #13132a 50%, #0d0d14 100%);
  z-index: 5000; display: flex; flex-direction: column; align-items: center;
  justify-content: flex-start; padding: 20px; gap: 14px;
  overflow-y: auto; -webkit-overflow-scrolling: touch;
}
#auth-overlay.hidden { display: none; }
.auth-box {
  width: 100%; max-width: 440px;
  background: rgba(22, 22, 42, 0.82);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(192, 38, 211, 0.25);
  border-top: 2px solid var(--green);
  border-radius: 22px;
  padding: 32px 28px;
  box-shadow: 0 20px 60px rgba(0, 80, 200, 0.22), 0 4px 16px rgba(0,0,0,0.45);
}
.auth-field { margin-bottom: 16px; }
.auth-input {
  width: 100%; height: 44px;
  background: rgba(18, 18, 35, 0.70);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(176, 110, 243, 0.22);
  border-radius: 10px;
  color: var(--text); font-family: var(--sans);
  padding: 10px 14px; outline: none; box-sizing: border-box;
  transition: border-color .2s, box-shadow .2s;
}
.auth-input:focus {
  border-color: rgba(176, 110, 243, 0.65);
  box-shadow: 0 0 0 3px rgba(176, 110, 243, 0.12);
}
.auth-btn {
  width: 100%; padding: 13px;
  background: linear-gradient(90deg, #8b2fc9 0%, #f0249e 100%);
  border: none; border-radius: 12px;
  color: #fff; cursor: pointer;
  font-family: var(--sans); font-size: 13px; font-weight: bold; letter-spacing: 1px;
  box-shadow: 0 4px 22px rgba(139, 47, 201, 0.45), 0 2px 8px rgba(240, 36, 158, 0.25);
  transition: all .2s;
}
.auth-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(240, 36, 158, 0.60), 0 4px 14px rgba(139, 47, 201, 0.40); }
.auth-switch { text-align: center; margin-top: 14px; font-size: 12px; color: var(--text3); }
.auth-switch a { color: var(--green); cursor: pointer; text-decoration: underline; }
.auth-error { background: rgba(224,112,112,0.1); border: 1px solid rgba(224,112,112,0.3); padding: 10px; color: var(--red); font-size: 12px; margin-bottom: 14px; display: none; }
.auth-error.show { display: block; }
.supervisor-tag { font-size: 11px; color: var(--gold); text-align: center; margin-top: 15px; font-family: var(--sans); border-top: 1px dashed var(--border); padding-top: 10px; }

/* ══ MODAL ══ */
.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,10,30,.70); backdrop-filter: blur(6px); z-index: 200; align-items: center; justify-content: center; }
.modal-bg.open { display: flex; }
.modal {
  background: rgba(8, 25, 60, 0.75);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(56, 189, 248, 0.25);
  border-top: 2px solid var(--green);
  border-radius: 20px;
  padding: 28px;
  width: 380px;
  box-shadow: 0 16px 48px rgba(0, 80, 200, 0.25), 0 2px 8px rgba(0,0,0,0.5);
}
.modal-input { width: 100%; background: var(--bg2); border: 1px solid var(--border); color: var(--text); padding: 9px; outline: none; margin-bottom: 14px; font-family: var(--sans); }
.modal-hint { font-size: 11px; color: var(--text3); margin: -8px 0 14px; line-height: 1.6; }
.emoji-options { display: flex; gap: 8px; margin-bottom: 14px; justify-content: center; }
.emoji-opt { font-size: 20px; cursor: pointer; padding: 5px; border: 1px solid transparent; }
.emoji-opt.selected { border-color: var(--green); background: var(--bg2); }
.modal-btns { display: flex; gap: 10px; justify-content: flex-end; }
.modal-cancel { background: transparent; border: 1px solid var(--border); color: var(--text3); padding: 8px 16px; cursor: pointer; }
.modal-ok { background: var(--green); border: none; color: white; padding: 8px 16px; cursor: pointer; font-weight: bold; }

/* ══ FOCUS CHECK MODAL ══ */
.modal.focus-modal { border-top-color: var(--gold); text-align: center; }
.focus-modal-icon { font-size: 34px; margin-bottom: 10px; }
.focus-modal-title { font-weight: 700; font-size: 16px; margin-bottom: 8px; color: var(--gold); }
.focus-modal-sub { font-size: 12px; color: var(--text3); margin-bottom: 18px; line-height: 1.7; }

/* ══ STUDENT PROFILE VIEW MODAL ══ */
.modal.profile-view-modal { width: 520px; max-width: 92vw; max-height: 82vh; overflow-y: auto; }
.focus-modal-btns { display: flex; gap: 10px; }
.focus-yes-btn { flex: 1; background: var(--green); border: none; color: white; padding: 12px; cursor: pointer; font-weight: bold; font-size: 13px; }
.focus-no-btn { flex: 1; background: transparent; border: 1px solid var(--red); color: var(--red); padding: 12px; cursor: pointer; font-weight: bold; font-size: 13px; }

/* ══ LINK SESSION ══ */
.link-session-panel { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; padding: 20px; gap: 12px; }
.link-session-url { font-size: 12px; color: var(--text3); word-break: break-all; max-width: 90%; font-family: var(--mono); }
.link-session-start-btn { background: var(--green); border: none; color: white; padding: 10px 20px; cursor: pointer; font-weight: bold; }
.link-session-stop-btn { background: transparent; border: 1px solid var(--red); color: var(--red); padding: 8px 16px; cursor: pointer; font-size: 12px; }

/* Grades Colors */
.grade-SSS { color: #FF00FF; text-shadow: 0 0 10px rgba(255,0,255,0.5); }
.grade-SS { color: #FF80FF; }
.grade-S { color: #4EA88A; }
.grade-A { color: #C8A84A; }
.grade-B { color: #5A9AE0; }
.grade-C { color: #8888BB; }
.grade-D { color: #606078; }
.grade-F { color: #E07070; }

/* ══ QUIZ ══ */
.quiz-progress-track { height: 4px; background: var(--bg3); margin-bottom: 18px; overflow: hidden; }
.quiz-progress-fill { height: 100%; background: var(--green); transition: width .3s ease; }
.quiz-opt-btn {
  display: flex; align-items: center; gap: 10px; width: 100%;
  padding: 14px 16px;
  background: rgba(22, 22, 42, 0.58);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(56,189,248,0.15);
  border-radius: 12px;
  color: var(--text2); text-align: right; margin-bottom: 10px;
  font-family: var(--sans); font-size: 13px; cursor: pointer;
  transition: all .18s;
  box-shadow: 0 2px 8px rgba(0,50,150,0.10);
}
.quiz-opt-btn:hover:not(:disabled) {
  border-color: rgba(56,189,248,0.45); color: var(--text);
  background: rgba(10, 35, 80, 0.65);
  transform: translateX(-3px);
  box-shadow: 0 4px 16px rgba(56,189,248,0.14);
}
.quiz-opt-num { font-family: var(--mono); font-size: 11px; color: var(--text3); border: 1px solid var(--border2); width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.quiz-opt-btn.correct { border-color: var(--green); background: var(--green-dim); color: var(--green); }
.quiz-opt-btn.correct .quiz-opt-num { border-color: var(--green); color: var(--green); }
.quiz-opt-btn.wrong { border-color: var(--red); background: var(--red-dim); color: var(--red); }
.quiz-opt-btn.wrong .quiz-opt-num { border-color: var(--red); color: var(--red); }
.quiz-opt-btn:disabled { cursor: default; }
.quiz-score-pill { font-family: var(--mono); font-size: 11px; color: var(--gold); }
/* ══ MIND GAMES HUB ══ */
.mindgames-grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(220px,1fr)); gap:16px;}
.mindgame-card{
  background: var(--glass);
  backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--glass-border);
  border-radius: 18px;
  padding: 24px 18px; text-align: center; cursor: pointer;
  transition: all .2s;
  box-shadow: var(--glass-shadow);
}
.mindgame-card:hover{
  border-color: rgba(56,189,248,0.5);
  transform: translateY(-5px);
  box-shadow: 0 14px 40px rgba(0,120,220,0.25);
}
.mindgame-card.disabled{cursor:default; opacity:.6;}
.mindgame-card.disabled:hover{border-color:var(--border); transform:none;}
.mindgame-card-icon{font-size:40px; margin-bottom:10px;}
.mindgame-card-title{font-size:14px; font-weight:700; color:var(--text); margin-bottom:6px;}
.mindgame-card-sub{font-size:11px; color:var(--text3); line-height:1.7; margin-bottom:14px;}
.mindgame-card-btn{display:inline-block; background:var(--green-dim); color:var(--green); border:1px solid var(--green); padding:6px 16px; font-size:10.5px; letter-spacing:1px;}

/* ══ CHESS GAME ══ */
.chess-setup{
  background: var(--glass);
  backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--glass-border);
  border-radius: 18px;
  padding: 24px; max-width: 480px; margin: 0 auto 20px;
  box-shadow: var(--glass-shadow);
}
.chess-setup h3{font-size:13px; color:var(--green); margin-bottom:14px;}
.chess-mode-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px;}
.chess-mode-btn{background:var(--bg2); border:1px solid var(--border); color:var(--text2); padding:12px 8px; font-size:11.5px; cursor:pointer; transition:all .15s; text-align:center;}
.chess-mode-btn:hover{border-color:var(--green);}
.chess-mode-btn.selected{border-color:var(--green); color:var(--green); background:var(--green-dim);}
.chess-diff-row{display:flex; gap:8px; margin-bottom:14px;}
.chess-diff-btn{flex:1; background:var(--bg2); border:1px solid var(--border); color:var(--text2); padding:8px; font-size:11px; cursor:pointer;}
.chess-diff-btn.selected{border-color:var(--gold); color:var(--gold); background:var(--gold-dim);}
.chess-start-btn{width:100%; background:var(--green); color:#0A0A0C; border:none; padding:12px; font-weight:700; font-size:13px; cursor:pointer; letter-spacing:1px;}
.chess-start-btn:hover{opacity:.9;}
.chess-wrap{display:flex; flex-wrap:wrap; gap:20px; justify-content:center; align-items:flex-start;}
.chess-board{display:grid; grid-template-columns:repeat(8, 58px); grid-template-rows:repeat(8, 58px); border:2px solid var(--border2); box-shadow:0 8px 30px rgba(0,0,0,.5); position:relative;}
.chess-coord-col{display:grid; grid-template-columns:repeat(8, 58px); font-family:var(--mono); font-size:10px; color:rgba(200,190,160,0.7); text-align:center; padding-top:2px;}
.chess-coord-row{display:flex; flex-direction:column; font-family:var(--mono); font-size:10px; color:rgba(200,190,160,0.7); justify-content:space-around; padding-right:3px; width:14px;}
.chess-board-wrap{display:flex; align-items:flex-start; gap:0;}
.chess-rank-label{width:14px; line-height:58px; text-align:center; font-family:var(--mono); font-size:10px; color:rgba(200,190,160,0.7);}
.chess-sq{width:58px; height:58px; display:flex; align-items:center; justify-content:center; cursor:pointer; position:relative; user-select:none; box-sizing:border-box;}
.chess-sq.light{background:#B0A090;}
.chess-sq.dark{background:#7A5C3E;}
.chess-sq.selected{outline:3px solid var(--gold); outline-offset:-3px;}
.chess-sq.target::after{content:''; position:absolute; width:16px; height:16px; border-radius:50%; background:rgba(78,200,138,.70);}
.chess-sq.target-capture::after{content:''; position:absolute; inset:3px; border:3px solid rgba(224,112,112,.80); border-radius:50%; background:none;}
.chess-sq.last-move{background:rgba(240,200,80,.38) !important;}
.chess-sq.in-check{background:rgba(255,60,60,.55) !important;}
.chess-piece-w{color:#FFFFFF; text-shadow:0 0 4px #000, 0 2px 4px rgba(0,0,0,0.9), 1px 1px 0 #333; font-size:40px; line-height:1; pointer-events:none; filter:drop-shadow(0 2px 2px rgba(0,0,0,0.8));}
.chess-piece-b{color:#1A1A1A; text-shadow:0 0 4px rgba(255,255,255,0.3), 0 2px 4px rgba(0,0,0,0.8), -1px -1px 0 #555; font-size:40px; line-height:1; pointer-events:none; filter:drop-shadow(0 2px 2px rgba(0,0,0,0.8));}
.chess-side-panel{min-width:220px; font-family:var(--mono);}
.chess-status{background:var(--surface); border:1px solid var(--border); padding:12px 14px; margin-bottom:10px; font-size:12px; color:var(--text2);}
.chess-status b{color:var(--green);}
.chess-log{background:var(--surface); border:1px solid var(--border); padding:10px 14px; height:220px; overflow-y:auto; font-size:10.5px; color:var(--text3); line-height:1.8;}
.chess-controls{display:flex; gap:8px; margin-top:10px;}
.chess-btn{flex:1; background:var(--bg2); border:1px solid var(--border); color:var(--text2); padding:8px; font-size:10.5px; cursor:pointer;}
.chess-btn:hover{border-color:var(--green); color:var(--green);}
.chess-promo-row{display:flex; gap:6px; justify-content:center; margin-top:10px;}
.chess-promo-btn{font-size:26px; background:var(--bg2); border:1px solid var(--border); cursor:pointer; width:46px; height:46px;}
.chess-promo-btn:hover{border-color:var(--gold);}
@media (max-width:560px){
  .chess-board{grid-template-columns:repeat(8, 42px); grid-template-rows:repeat(8, 42px);}
  .chess-sq{width:42px; height:42px;}
  .chess-piece-w, .chess-piece-b{font-size:30px;}
}

/* ══ GLASSMORPHISM EXTRA — تحسينات إضافية ══ */

/* Tab buttons */
.tab-btn {
  padding: 0 16px; height: 56px; border: none;
  background: transparent; color: rgba(144,200,232,0.5);
  font-family: var(--sans); font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all .2s;
  border-bottom: 2px solid transparent; margin-bottom: -2px;
}
.tab-btn:hover { color: var(--text2); background: rgba(56,189,248,0.05); }
.tab-btn.active { color: var(--text); border-bottom-color: transparent; background: transparent; }

/* eyebrow */
.eyebrow { font-family: var(--sans); font-size: 13px; font-weight: 700; color: var(--text2); margin: 28px 0 14px; display: flex; align-items: center; gap: 10px; }
.eyebrow::before { content: ''; display: block; width: 18px; height: 2px; background: linear-gradient(90deg, var(--green), transparent); border-radius: 2px; }

/* list header */
.list-header {
  display: grid; grid-template-columns: 36px 1fr 100px 100px 90px 90px 110px 110px 40px;
  gap: 12px; padding: 10px 16px;
  background: rgba(5, 15, 40, 0.60);
  backdrop-filter: blur(10px);
  border-radius: 12px 12px 0 0;
  color: var(--text3); font-family: var(--sans); font-size: 11px;
  border: 1px solid rgba(56,189,248,0.12); border-bottom: none;
}

/* time breakdown */
.time-breakdown {
  background: var(--glass);
  backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  padding: 20px 22px; margin-top: 14px;
  box-shadow: var(--glass-shadow);
}
.time-rows { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
.time-row-item {
  background: rgba(8, 25, 65, 0.50);
  border: 1px solid rgba(56,189,248,0.12);
  border-radius: 12px;
  padding: 14px 12px; text-align: center;
  transition: transform .2s;
}
.time-row-item:hover { transform: translateY(-2px); }

/* rank circle */
.rank-circle {
  width: 80px; height: 80px; border-radius: 50%;
  border: 2px solid rgba(56,189,248,0.40);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 12px;
  font-family: var(--mono); font-size: 24px;
  background: rgba(8, 25, 65, 0.55);
  box-shadow: 0 0 20px rgba(56,189,248,0.18), inset 0 0 10px rgba(56,189,248,0.08);
}

/* progress bar */
.progress-bar-track { height: 4px; background: rgba(56,189,248,0.10); border-radius: 4px; margin-top: 5px; }
.progress-bar-fill { height: 100%; background: linear-gradient(90deg, #0ea5e9, #38bdf8); border-radius: 4px; transition: width 0.5s ease; }

/* scrollbar global */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(56,189,248,0.20); border-radius: 4px; }

/* pts pill */
.pts-pill {
  background: rgba(251,191,36,0.10);
  border: 1px solid rgba(251,191,36,0.35);
  border-radius: 6px;
  padding: 2px 10px; font-family: var(--mono); font-size: 11px;
  color: var(--gold); letter-spacing: 1px; font-weight: bold;
}

/* report form */
.report-form-wrap {
  background: var(--glass);
  backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--glass-border);
  border-radius: 18px;
  padding: 24px;
  box-shadow: var(--glass-shadow);
}

/* modal input */
.modal-input {
  width: 100%;
  background: rgba(5, 20, 50, 0.55);
  border: 1px solid rgba(56,189,248,0.18);
  border-radius: 10px;
  color: var(--text); padding: 10px 14px; outline: none;
  margin-bottom: 14px; font-family: var(--sans);
  transition: border-color .2s;
}

/* auth info panel */
.auth-info-panel {

  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);

/* ══ DAILY TASKS ══ */
